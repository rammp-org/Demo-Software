# camera_demo_main.yaml
# ============================================================
# April Demo — Default Camera Configuration
# ============================================================
# Loaded by camera.launch.py as the default params_file for
# both the RealSense D435i (wrist) and Orbbec Gemini 336L (nav).
#
# To override at launch time, pass a different config file:
#   ros2 launch rammp_prototype_bringup camera.launch.py \
#       params_file:=$(ros2 pkg prefix rammp_prototype_bringup \
#           --share)/config/camera_no_realsense.yaml
#
# Or pass individual arguments directly:
#   ros2 launch rammp_prototype_bringup camera.launch.py \
#       disable_realsense:=true
#       wrist_camera_serial:=<SN>
#       nav_camera_serial:=<SN>
# ============================================================

# ── Wrist Camera — Intel RealSense D435i ──────────────────────
/wrist:
  ros__parameters:
    camera_name: "wrist"
    base_frame_id: "wrist_camera_link"
    serial_no: ""

# ── Nav Camera — Orbbec Gemini 336L ───────────────────────────
/camera/nav:
  ros__parameters:
    camera_name: "nav"
    camera_namespace: "camera"
    depth_frame_id: "nav_camera_link"
    color_frame_id: "nav_camera_color_link"
    serial_number: ""
