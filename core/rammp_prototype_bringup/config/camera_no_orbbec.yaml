# camera_no_orbbec.yaml
# ============================================================
# Camera Configuration — Wrist Camera Only (no Orbbec)
# ============================================================
# Use when the Orbbec Gemini 336L nav camera is not connected.
#
# Usage:
#   ros2 launch rammp_prototype_bringup camera.launch.py \
#       disable_orbbec:=true \
#       params_file:=$(ros2 pkg prefix rammp_prototype_bringup \
#           --share)/config/camera_no_orbbec.yaml
# ============================================================

# ── Wrist Camera — Intel RealSense D435i ──────────────────────
/wrist:
  ros__parameters:
    camera_name: "wrist"
    base_frame_id: "wrist_camera_link"
    serial_no: ""
