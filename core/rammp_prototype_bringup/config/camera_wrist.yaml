# camera_wrist.yaml
# ============================================================
# Camera Configuration — Wrist Camera Only
# ============================================================
# Use when the Orbbec Gemini 336L nav camera is not connected.
#
# Usage:
#   ros2 launch rammp_prototype_bringup camera.launch.py \
#       params_file:=$(ros2 pkg prefix rammp_prototype_bringup \
#           --share)/config/camera_wrist.yaml
# ============================================================

disable_realsense: false
disable_orbbec: true

/wrist:
  ros__parameters:
    camera_name: "wrist"
    base_frame_id: "wrist_camera_link"
    serial_no: ""
