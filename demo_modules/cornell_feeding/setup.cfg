[develop]
script_dir=$base/lib/cornell_feeding
[install]
install_scripts=$base/lib/cornell_feeding

# Only collect this package's own tests. The vendored rammp/ tree contains a stray
# dev script (assets/robot/test_robot.py) that opens a PyBullet GUI and loops forever
# at import time; without this, pytest would try to collect it and hang.
[tool:pytest]
testpaths = test
